<svg id="gh-dark-mode-only" width="360" height="302" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: white;
  stroke: rgb(225, 228, 232);
  stroke-width: 1px;
  rx: 6px;
  ry: 6px;
}

#gh-dark-mode-only:target #background {
  fill: #0d1117;
  stroke-width: 0.5px;
}

foreignObject {
  width: calc(100% - 10px - 32px);
  height: calc(100% - 10px - 24px);
}

h2 {
  margin-top: 0;
  margin-bottom: 0.75em;
  line-height: 24px;
  font-size: 16px;
  font-weight: 600;
  color: rgb(36, 41, 46);
  fill: rgb(36, 41, 46);
}

#gh-dark-mode-only:target h2 {
  color: #c9d1d9;
  fill: #c9d1d9;
}

ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

li {
  display: flex;
  align-items: center;
  flex-wrap: nowrap;
  font-size: 12px;
  line-height: 18px;
  padding: 3px 0;
  transform: translateX(-200%);
  animation: slideIn 2s ease-in-out forwards;
}

@keyframes slideIn {
  to {
    transform: translateX(0);
  }
}

.repo-name {
  flex: 1 1 auto;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-weight: 600;
  color: rgb(3, 102, 214);
}

#gh-dark-mode-only:target .repo-name {
  color: #58a6ff;
}

.repo-stat {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  width: 68px;
  color: rgb(88, 96, 105);
}

#gh-dark-mode-only:target .repo-stat {
  color: #8b949e;
}

.octicon {
  fill: rgb(88, 96, 105);
  margin-right: 0.5ch;
  flex: 0 0 auto;
}

#gh-dark-mode-only:target .octicon {
  fill: #8b949e;
}

.empty {
  font-size: 12px;
  color: rgb(88, 96, 105);
}
</style>
<g>
<rect x="5" y="5" id="background" />
<g>
<foreignObject x="21" y="17" width="318" height="268">
<div xmlns="http://www.w3.org/1999/xhtml" style="overflow: hidden;">

<h2>Top Repositories (By Views)</h2>

<ul>

{{ repo_list }}

</ul>

</div>
</foreignObject>
</g>
</g>
</svg>
